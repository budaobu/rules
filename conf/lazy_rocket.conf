# 表示CN地区的IP分流走直连，GEOIP数据库用来判断IP是否属于CN地区。默认使用Shadowrocket自带的GEOIP数据库，如果您想替换其他数据库，可在 设置 - GeoLite2数据库 里添加和修改。
GEOIP,CN,DIRECT,no-resolve

# 表示当其他所有规则都匹配不到时才使用FINAL规则的策略。
FINAL,PROXY

[Host]
# 域名指定本地值：
# example.com = 1.2.3.4

# 域名指定 DNS 服务器：
# example.com = server:1.2.3.4

# wifi名称指定 DNS 服务器，如需指定多个 DNS，可用逗号分隔：
# ssid:wifi名称 = server:1.2.3.4
*.95516.com = server:h3://dns.alidns.com/dns-query
*.abchina.com = server:h3://dns.alidns.com/dns-query
*.abchina.com.cn = server:h3://dns.alidns.com/dns-query
*.wechatpay.cn =server:https://doh.pub/dns-query
*.apple.com = server:https://doh.dns.apple.com/dns-query
*.icloud.com = server:https://doh.dns.apple.com/dns-query
*.0m0.dev = server:h3://dns.alidns.com/dns-query
localhost = 127.0.0.1

[URL Rewrite]
# Google搜索引擎防跳转的重写。
^https?:\/\/(www.)?(g|google)\.cn https://www.google.com 302
# Anti_ISP_JavaScript_Injection header header
^https?:\/\/c.minisplat.cn - reject
^https?:\/\/c1.minisplat.cn - reject
^https?:\/\/cache.changjingyi.cn - reject
^https?:\/\/cache.gclick.cn - reject
# Anti_ISP_Safari_Baidu_CPM_Hijack header header
^https?:\/\/m.coolaiy.com\/b.php - reject
^https?:\/\/www.babyye.com\/b.php - reject
^https?:\/\/www.gwv7.com\/b.php - reject
^https?:\/\/www.likeji.net\/b.php - reject

[Header Rewrite]
http-request ^https:\/\/github\.com\/ header-replace Accept-Language en-us
http-request ^https:\/\/(raw|gist)\.githubusercontent\.com\/ header-replace Accept-Language en-us

[MITM]
hostname = www.google.com, *.g.cn, www.g.cn, *.google.cn, www.google.cn, -*amemv.com, -*snssdk.com, *.google-analytics.com
h2 = true
enable = false
# Shadowrocket仅会解密hostname指定的域名的请求，可以使用通配符。也可以使用前缀 - 排除特定主机名，如 -*.example.com。iOS系统和某些应用有严格的安全策略，仅信任某些特定的证书，对这些域名启动解密可能导致问题，如 *.apple.com，*.icloud.com。
# 自版本 2.2.81 (3096) 起支持通过 HTTP/2 协议进行中间人攻击来解密 HTTPS 流量。当在纯文本模式的 [MITM] 字段中使用 h2 = true 命令时表示启用，等同于在 UI 界面开启对应开关
