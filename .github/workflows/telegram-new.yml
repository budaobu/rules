name: Fetch Telegram ASN and CIDR Lists

on:
  schedule:
    - cron: '8 19 * * 1'
  push:
    branches:
      - main
    paths:
      - 'py/telegram-scraper.py'
      - '.github/workflows/telegram-new.yml'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4 lxml

      - name: Run scraper
        run: python py/telegram-scraper.py

      - name: Validate output
        run: |
          for f in lists/telegram_ip_official.list lists/telegram_asn.list; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            fi
            count=$(wc -l < "$f")
            if [ "$count" -lt 5 ]; then
              echo "❌ $f has only $count lines"
              exit 1
            fi
            echo "✓ $f: $count lines"
          done

          if ! grep -q "^IP-CIDR," lists/telegram_ip_official.list; then
            echo "❌ No IP-CIDR entries in telegram_ip_official.list"
            exit 1
          fi

          if ! grep -q "^IP-ASN," lists/telegram_asn.list; then
            echo "❌ No IP-ASN entries in telegram_asn.list"
            exit 1
          fi

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code lists/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Update Telegram IP/ASN lists

            Auto-generated by GitHub Actions
            Run ID: ${{ github.run_id }}
          file_pattern: 'lists/telegram_ip_official.list lists/telegram_asn.list'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-logs
          path: lists/
          retention-days: 7
